.verified{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#f5c84233,#f5c84211);border:1px solid #f5c84244;border-radius:20px;padding:3px 10px;font-size:11px;color:var(--gold);font-weight:600;letter-spacing:1px}
.verified .vdot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:vpulse 2s infinite}

.hdr{background:linear-gradient(180deg,#0f1a30,var(--bg));padding:16px 16px 12px;position:sticky;top:0;z-index:50}

.hdr h1{font-size:18px;color:var(--gold);font-weight:700}

.update-tag{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600;white-space:nowrap}
.update-tag.fresh{background:rgba(46,232,158,0.15);color:var(--green);border:1px solid rgba(46,232,158,0.3)}
.update-tag.stale{background:rgba(245,200,66,0.15);color:var(--gold);border:1px solid rgba(245,200,66,0.3)}
.search-bar{display:flex;gap:8px}
.search-bar input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:15px;outline:none}
.search-bar input::placeholder{color:#3a4a66}
.search-bar input:focus{border-color:var(--gold)}
.search-bar button{background:var(--gold);border:none;border-radius:10px;padding:10px 18px;color:var(--bg);font-weight:700;font-size:14px;cursor:pointer}

.tab{padding:10px 14px;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
.page{display:none;padding:12px 16px 100px}
.page.active{display:block}
.cat-section{margin-bottom:16px}
.cat-title{font-size:14px;font-weight:700;padding:8px 0 6px;display:flex;align-items:center;gap:6px}
.cat-title .badge{font-size:10px;background:var(--border);color:var(--text2);padding:1px 6px;border-radius:4px;font-weight:400}
.ptable{width:100%;border-collapse:collapse;font-size:13px}
.ptable th{text-align:left;padding:6px 8px;color:var(--text2);font-size:11px;font-weight:600;border-bottom:1px solid var(--border)}
.ptable td{padding:8px;border-bottom:1px solid #1e2d4a33}
.ptable .pn{color:var(--text);font-weight:500}
.ptable .pp{color:var(--gold);font-weight:700;white-space:nowrap}
.ptable .ps{font-size:10px;color:var(--text2)}
.pr-up{color:var(--green)!important}
.pr-down{color:var(--red)!important}
.flash-up{animation:flashUp 1s ease}
.flash-down{animation:flashDown 1s ease}
@keyframes flashUp{0%{background:rgba(46,232,158,0.3)}100%{background:transparent}}
@keyframes flashDown{0%{background:rgba(245,66,108,0.3)}100%{background:transparent}}
.new-tag{display:inline-block;font-size:9px;background:var(--red);color:#fff;padding:0 4px;border-radius:3px;margin-left:4px;font-weight:700}
.foot-seal{text-align:center;padding:20px 16px 40px}

.lock-overlay.hidden{display:none}
.lock-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px;max-width:340px;width:90%;text-align:center}
.lock-box h2{color:var(--gold);font-size:18px;margin-bottom:6px}
.lock-box p{color:var(--text2);font-size:12px;margin-bottom:20px}

.lock-box button{width:100%;background:var(--gold);border:none;border-radius:10px;padding:12px;color:var(--bg);font-weight:700;font-size:15px;cursor:pointer}
.lock-box button:hover{opacity:.9}
.lock-box .lock-hint{color:var(--text2);font-size:10px;margin-top:10px}
.lock-err{color:var(--red);font-size:12px;margin-bottom:8px;display:none}

/* Admin trigger */
.admin-trigger{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:999;background:linear-gradient(180deg,#f5c842,#e6a817);color:var(--bg);font-weight:700;font-size:14px;padding:12px 6px;border-radius:8px 0 0 8px;cursor:pointer;writing-mode:vertical-rl;letter-spacing:4px;box-shadow:0 0 20px rgba(245,200,66,0.4);transition:.2s}

.admin-login-box h3{color:var(--gold);text-align:center;margin-bottom:16px;font-size:16px}

.admin-login-box .al-cancel{background:var(--border);color:var(--text2)}

// === Card Key System (Self-Validating) ===
const CK_SECRET='jwry_mh_2026x';
function ckHash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h).toString(36)}
function encodeKey(days,ts){
  const t=ts||Date.now();
  const raw=t.toString(36)+'|'+days+'|'+CK_SECRET;
  const sig=ckHash(raw);
  const payload=btoa(t.toString(36)+':'+days+':'+sig).replace(/=+/g,'');
  const seg=payload.match(/.{1,5}/g).join('-');
  return 'MH-'+seg;
}
function decodeKey(code){
  try{
    if(!code.startsWith('MH-'))return null;
    const payload=code.slice(3).replace(/-/g,'');
    const decoded=atob(payload);
    const parts=decoded.split(':');
    if(parts.length!==3)return null;
    const t=parseInt(parts[0],36);
    const days=parseInt(parts[1]);
    const sig=parts[2];
    const expected=ckHash(t.toString(36)+'|'+days+'|'+CK_SECRET);
    if(sig!==expected)return null;
    return{createdAt:t,days:days};
  }catch(e){return null}
}
function isAuthed(){try{const a=JSON.parse(localStorage.getItem('mh_ck_auth'));if(!a||!a.expire)return false;return Date.now()<a.expire}catch(e){return false}}
function setAuthed(key,days){localStorage.setItem('mh_ck_auth',JSON.stringify({key:key,expire:Date.now()+days*86400000,days:days}))}

// Track used keys to prevent reuse on same device
function getUsedKeys(){try{return JSON.parse(localStorage.getItem('mh_ck_used')||'[]')}catch(e){return[]}}
function addUsedKey(code){const u=getUsedKeys();u.push(code);localStorage.setItem('mh_ck_used',JSON.stringify(u))}
function isKeyUsed(code){return getUsedKeys().includes(code)}

function verifyKey(){
  const inp=document.getElementById('keyInput').value.trim();
  const errEl=document.getElementById('lockErr');
  if(!inp){errEl.style.display='block';errEl.textContent='请输入卡密';return}
  const info=decodeKey(inp);
  if(!info){errEl.style.display='block';errEl.textContent='卡密无效';return}
  if(isKeyUsed(inp)){errEl.style.display='block';errEl.textContent='卡密已使用';return}
  const now=Date.now();
  const expireAt=info.createdAt+info.days*86400000;
  if(now>expireAt){errEl.style.display='block';errEl.textContent='卡密已过期';return}
  addUsedKey(inp);
  setAuthed(inp,info.days);
  document.getElementById('lockOverlay').classList.add('hidden');
  const remain=Math.ceil((expireAt-now)/86400000);
  alert('✅ 验证成功！有效期'+remain+'天');
  checkExpiry();
}

function checkExpiry(){
  try{const a=JSON.parse(localStorage.getItem('mh_ck_auth'));if(!a)return;const r=Math.ceil((a.expire-Date.now())/86400000);if(r<=3&&r>0)alert('⏰ 卡密将在'+r+'天后到期，请及时续费')}catch(e){}
}

function getLatestPrice(dates){
  const dk=Object.keys(dates).sort().reverse();
  return dk.length?{...dates[dk[0]],dateKey:dk[0]}:null;
}

function getPrevPrice(dates){
  const dk=Object.keys(dates).sort().reverse();
  return dk.length>1?dates[dk[1]]:null;
}

function renderData(){
  if(!Object.keys(DATA).length)return;
  const cats={};
  let totalCount=0;
  for(const[name,dates]of Object.entries(DATA)){
    totalCount++;
    const cat=classifyItem(name);
    if(!cats[cat])cats[cat]=[];
    const latest=getLatestPrice(dates);
    const prev=getPrevPrice(dates);
    cats[cat].push({name,latest,prev,isNew:latest&&latest.dateKey&&latest.dateKey.includes('2026-06-06')});
  }
  document.getElementById('totalCount').textContent='共'+totalCount+'项';
  // All tab
  let allHtml='';
  for(let c=0;c<=10;c++){

function renderCatSection(title,items){
  let html='<div class="cat-section"><div class="cat-title">'+title+' <span class="badge">'+items.length+'项</span></div>';
  html+='<table class="ptable"><tr><th>物品</th><th>价格</th><th>来源</th></tr>';
  items.forEach(it=>{
    if(!it.latest)return;
    const p=it.latest;
    const priceStr=typeof p.price==='number'?p.price+(p.unit||'万'):p.price+(p.unit||'万');
    let cls='',arrow='',newTag='';
    if(it.prev&&typeof it.latest.price==='number'&&typeof it.prev.price==='number'){
      const diff=it.latest.price-it.prev.price;
      if(diff>0){cls='pr-up';arrow=' ▲';html+'<tr class="flash-up">'}
      else if(diff<0){cls='pr-down';arrow=' ▼'}
    }
    if(it.isNew)newTag='<span class="new-tag">NEW</span>';
    html+='<tr'+(cls==='pr-up'?' class="flash-up"':cls==='pr-down'?' class="flash-down"':'')+'><td class="pn">'+it.name+newTag+'</td><td class="pp '+cls+'">'+priceStr+arrow+'</td><td class="ps">'+(p.source||'')+'</td></tr>';
  });
  html+='</table></div>';
  return html;
}

function getPrice(name){
  const d=DATA[name];
  if(!d)return 0;
  const dk=Object.keys(d).sort().reverse();
  if(!dk.length)return 0;
  let p=d[dk[0]].price;
  if(typeof p==='string'){
    const m=p.match(/[\d.]+/);
    p=m?parseFloat(m[0]):0;
  }
  return typeof p==='number'?p:parseFloat(p)||0;
}

function addProfitItem(name,value){
  const STORAGE_KEY='mh_profit_records';
  const records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  const now=new Date();
  const timeStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const dateStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  records.push({name,value,date:dateStr,time:timeStr});
  localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
  renderProfit();
}

function delProfitItem(todayIdx){
  const STORAGE_KEY='mh_profit_records';
  const records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  const todayKey2=(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')})();
  let ti=0;
  for(let i=0;i<records.length;i++){
    if(records[i].date===todayKey2){
      if(ti===todayIdx){records.splice(i,1);break}
      ti++;
    }
  }
  localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
  renderProfit();
}

function clearProfitToday(){
  if(!confirm('确定清空今日所有记录？'))return;
  const STORAGE_KEY='mh_profit_records';
  const records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  const todayKey2=(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')})();
  const remaining=records.filter(r=>r.date!==todayKey2);
  localStorage.setItem(STORAGE_KEY,JSON.stringify(remaining));
  renderProfit();
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  event.target.classList.add('active');
  document.getElementById('searchResults').style.display='none';
}

function doSearch(){
  const kw=document.getElementById('searchInput').value.trim().toLowerCase();
  const sr=document.getElementById('searchResults');
  if(!kw){sr.style.display='none';document.getElementById('page-all').classList.add('active');return}
  sr.style.display='block';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  let html='',count=0;
  for(const[name,dates]of Object.entries(DATA)){
    if(name.toLowerCase().includes(kw)||kw.split('').every(c=>name.includes(c))){
      count++;
      const dk=Object.keys(dates).sort().reverse();
      const latest=dates[dk[0]];
      const price=typeof latest.price==='number'?latest.price+(latest.unit||'万'):latest.price+(latest.unit||'万');
      html+='<div class="search-item"><div class="si-name">'+name+'</div><div class="si-price">'+price+'</div><div class="si-meta">'+dk[0]+' · '+latest.source+'</div></div>';
    }
  }
  if(!count)html='<div style="text-align:center;color:var(--text2);padding:40px">没找到相关物品 😅</div>';
  sr.innerHTML=html;
}
